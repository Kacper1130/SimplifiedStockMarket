services:
  postgres:
    image: postgres:17.9
    container_name: stock_market_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_market
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d stock_market" ]
      interval: 5s
      retries: 5
      start_period: 10s
      timeout: 10s

  app:
    build: .
    deploy:
      replicas: 2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/stock_market
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - app